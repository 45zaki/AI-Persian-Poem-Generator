<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <title>AI Poem Generator</title>
  </head>
  <body>
  <div class="container">
    <header>
    <h1>AI Persian Poem Generator</h1>
    </header>
    <main>
        <form id="poem-generator-form">
          <input
            type="text"
            placeholder="Enter the topic of the Persian poem"
            autofocus
            required
            autocomplete="off"
            class="instructions"
            id="user-instructions"

          />
          <input type="submit" class="submit-button" />
        </form>
        <div class="hint">ex: Love, Nature, or Spring</div>
        <div class="poem hidden" id="poem"></div>

    </main>
    <iframe width="100%" height="166"
  scrolling="no" frameborder="no"
  allow="autoplay"
  src="https://w.soundcloud.com/player/?url=https://soundcloud.com/user-795465019/persian-inspiring-background-music-free-download&auto_play=true">
</iframe>
    <footer>
      This AI project was coded by
      <a href="https://github.com/45zaki/" target="_blank">Zakia Pezhman</a> and
      is
      <a
        href="https://github.com/45zaki/persian-ai-poem-generator"
        target="_blank"
      >
        open-sourced on GitHub</a
      >
      and is
      <a href="https://persian-ai-poam-generator.onrender.com" target="_blank"
        >hosted on Render</a
      >
    </footer>
    </div>
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.1.2/dist/axios.min.js"></script>
    <script src="src/index.js"></script>
   <div class="left-border"></div>
  </body>
</html>
